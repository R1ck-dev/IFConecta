spring:
  profiles:
    active: local 
  application:
    name: ifconecta

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate 
    properties:
        "[hibernate.format_sql]": true

  flyway:
    enabled: true
    baseline-on-migrate: true

api:
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration-ms: 86400000 